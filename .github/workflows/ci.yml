name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Run init tests
        run: bash tests/test-init.sh

      - name: Run config tests
        run: bash tests/test-config.sh

      - name: Run hook tests
        run: bash tests/test-hooks.sh

      - name: Run release tests
        run: bash tests/test-release.sh

      - name: Run e2e tests
        run: bash tests/test-e2e.sh

      - name: Run HTML rebuild e2e tests
        run: bash tests/test-html-rebuild-e2e.sh

      - name: Run v2.2 upgrade regression tests
        run: bash tests/test-v2-2-upgrade.sh

      - name: Run StackPilot protocol artifact regression tests
        run: bash tests/test-stackpilot-protocol.sh

      - name: Run Superpowers-like experience regression tests
        run: bash tests/test-superpowers-experience.sh
