name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run init tests
        run: bash tests/test-init.sh

      - name: Run hook tests
        run: bash tests/test-hooks.sh

      - name: Run e2e tests
        run: bash tests/test-e2e.sh
