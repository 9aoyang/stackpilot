name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  verify-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify tag matches VERSION
        run: bash scripts/release.sh verify-version "${GITHUB_REF_NAME}" VERSION

  create-release:
    runs-on: ubuntu-latest
    needs: verify-version
    steps:
      - uses: actions/checkout@v4

      - name: Generate release notes
        run: bash scripts/release.sh release-notes "${GITHUB_REF_NAME}" CHANGELOG.md > release-notes.md

      - name: Create GitHub release
        uses: actions/github-script@v7
        env:
          TAG_NAME: ${{ github.ref_name }}
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('release-notes.md', 'utf8');

            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: process.env.TAG_NAME,
              name: process.env.TAG_NAME,
              body,
              draft: false,
              prerelease: false
            });
