# Stackpilot project configuration
# Copy to project root and adjust values as needed

# AI provider — which CLI to use for agent dispatch
provider:
  name: claude             # claude | codex | gemini | custom
  # model: ~               # Override model (optional, provider-specific)
  # command: ~             # Required when name=custom, e.g. "aider --yes-always"

qa:
  coverage_threshold: 80    # Minimum test coverage %, adjust per project
  test_command: npm test    # Command to run test suite
  # Examples for other stacks:
  #   test_command: pytest
  #   test_command: go test ./...
  #   test_command: cargo test
  #   test_command: bundle exec rspec

coordinator:
  worktree_limit: 3         # Max parallel agent dispatches
  timeout_hours: 2          # Hours before in-progress task is marked failed
