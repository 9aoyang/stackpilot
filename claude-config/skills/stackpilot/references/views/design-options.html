<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta http-equiv="Content-Security-Policy" content="default-src 'self' https://cdn.jsdelivr.net; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; img-src 'self' data: https:; connect-src 'self' ws: wss:">
<title>Design Options - {{SPRINT_SLUG}}</title>
<style>
  :root {
    --page: #f5f5f7;
    --surface: rgba(255, 255, 255, 0.88);
    --surface-strong: #ffffff;
    --fill: #f2f2f7;
    --text: #1d1d1f;
    --muted: #6e6e73;
    --subtle: #86868b;
    --line: #d2d2d7;
    --line-strong: #b9b9c0;
    --blue: #0071e3;
    --blue-soft: #e8f2ff;
    --green: #248a3d;
    --red: #d70015;
    --shadow: 0 10px 30px rgba(0, 0, 0, 0.06);
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    background: var(--page);
    color: var(--text);
    font: 15px/1.47 -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
    letter-spacing: 0;
  }

  .shell {
    width: min(1180px, calc(100vw - 40px));
    margin: 0 auto;
    padding: 34px 0 28px;
  }

  header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 20px;
    margin-bottom: 22px;
  }

  .title-block { min-width: 0; }

  h1 {
    margin: 0;
    color: var(--text);
    font-size: 28px;
    line-height: 1.12;
    font-weight: 650;
  }

  .sub {
    margin-top: 8px;
    color: var(--muted);
    font-size: 14px;
    overflow-wrap: anywhere;
  }

  .question {
    margin: 0 0 18px;
    color: var(--text);
    font-size: 17px;
    font-weight: 600;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 14px;
    align-items: stretch;
  }

  .option {
    display: flex;
    min-width: 0;
    min-height: 100%;
    flex-direction: column;
    gap: 14px;
    padding: 18px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: var(--surface);
    box-shadow: var(--shadow);
    cursor: pointer;
    outline: none;
    transition: border-color 160ms ease, background 160ms ease, box-shadow 160ms ease, transform 160ms ease;
  }

  .option:hover {
    border-color: var(--line-strong);
    background: var(--surface-strong);
    transform: translateY(-1px);
  }

  .option:focus-visible {
    border-color: var(--blue);
    box-shadow: 0 0 0 3px rgba(0, 113, 227, 0.18), var(--shadow);
  }

  .option.selected {
    border-color: var(--blue);
    background: var(--surface-strong);
    box-shadow: 0 0 0 3px rgba(0, 113, 227, 0.13), var(--shadow);
  }

  .option-head {
    display: grid;
    grid-template-columns: 34px 1fr;
    gap: 12px;
    align-items: start;
  }

  .letter {
    display: grid;
    width: 34px;
    height: 34px;
    place-items: center;
    border-radius: 8px;
    background: var(--fill);
    color: var(--text);
    font-weight: 700;
  }

  .option.selected .letter {
    background: var(--blue);
    color: #fff;
  }

  .option h2 {
    margin: 0;
    color: var(--text);
    font-size: 18px;
    line-height: 1.24;
    font-weight: 650;
    overflow-wrap: anywhere;
  }

  .summary {
    margin: 5px 0 0;
    color: var(--muted);
    font-size: 14px;
    overflow-wrap: anywhere;
  }

  .diagram {
    min-height: 126px;
    max-height: 260px;
    overflow: auto;
    padding: 12px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: #fbfbfd;
  }

  .diagram:empty::before,
  .diagram .empty {
    color: var(--subtle);
    font-size: 13px;
  }

  .diagram svg {
    display: block;
    max-width: 100%;
    height: auto;
    margin: 0 auto;
  }

  .meta {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 8px;
    margin: 0;
  }

  .meta-item {
    min-width: 0;
    padding: 10px;
    border-radius: 8px;
    background: var(--fill);
  }

  .meta dt {
    margin: 0 0 3px;
    color: var(--subtle);
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
  }

  .meta dd {
    margin: 0;
    color: var(--text);
    font-size: 13px;
    font-weight: 600;
    overflow-wrap: anywhere;
  }

  .lists {
    display: grid;
    gap: 10px;
  }

  .list-title {
    margin: 0 0 6px;
    color: var(--subtle);
    font-size: 12px;
    font-weight: 650;
  }

  ul {
    margin: 0;
    padding: 0;
    list-style: none;
  }

  li {
    position: relative;
    margin: 0;
    padding: 3px 0 3px 16px;
    color: var(--muted);
    font-size: 13px;
    overflow-wrap: anywhere;
  }

  li::before {
    position: absolute;
    left: 0;
    top: 3px;
    font-weight: 700;
  }

  .pros li::before { content: "+"; color: var(--green); }
  .cons li::before { content: "-"; color: var(--red); }

  .pick-btn {
    width: 100%;
    min-height: 42px;
    margin-top: auto;
    border: 0;
    border-radius: 8px;
    background: var(--blue);
    color: #fff;
    font: inherit;
    font-size: 14px;
    font-weight: 650;
    cursor: pointer;
    transition: background 160ms ease, opacity 160ms ease;
  }

  .pick-btn:hover { background: #0077ed; }
  .pick-btn:disabled { cursor: default; opacity: 0.46; }

  .footer-status,
  .empty-state {
    margin-top: 16px;
    padding: 14px 16px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: var(--surface);
    color: var(--muted);
    font-size: 14px;
  }

  .footer-status.success { border-color: rgba(36, 138, 61, 0.35); color: var(--green); background: #f1faf3; }
  .footer-status.error,
  .empty-state.error { border-color: rgba(215, 0, 21, 0.28); color: var(--red); background: #fff2f3; }

  @media (max-width: 720px) {
    .shell {
      width: min(100% - 24px, 1180px);
      padding-top: 22px;
    }

    header {
      display: block;
      margin-bottom: 18px;
    }

    h1 { font-size: 24px; }
    .question { font-size: 16px; }
    .grid { grid-template-columns: 1fr; }
    .option { padding: 16px; }
  }
</style>
</head>
<body>
<main class="shell">
  <header>
    <div class="title-block">
      <h1>Design Options</h1>
      <div class="sub">{{SPRINT_SLUG}} · {{SPRINT_DESCRIPTION}}</div>
    </div>
  </header>

  <p class="question">{{QUESTION}}</p>
  <div class="grid" id="options"></div>
  <div class="footer-status" id="status">Waiting for selection.</div>
</main>

<script type="application/json" id="options-data">{{OPTIONS_JSON}}</script>
<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
<script>
const SPRINT_SLUG = "{{SPRINT_SLUG}}";
const grid = document.getElementById('options');
const status = document.getElementById('status');

function readOptions() {
  const raw = document.getElementById('options-data').textContent.trim();
  if (!raw || raw.includes('{{OPTIONS_JSON}}')) {
    throw new Error('OPTIONS_JSON was not filled.');
  }

  const parsed = JSON.parse(raw);
  if (!Array.isArray(parsed) || parsed.length < 2 || parsed.length > 3) {
    throw new Error('OPTIONS_JSON must contain 2-3 options.');
  }

  parsed.forEach((opt, index) => {
    const missing = ['key', 'title', 'summary', 'pros', 'cons', 'complexity', 'fit']
      .filter((field) => opt[field] == null || opt[field] === '');
    if (missing.length) {
      throw new Error(`Option ${index + 1} is missing: ${missing.join(', ')}.`);
    }
    if (!Array.isArray(opt.pros) || !Array.isArray(opt.cons)) {
      throw new Error(`Option ${opt.key || index + 1} pros and cons must be arrays.`);
    }
  });

  return parsed;
}

function renderOption(opt) {
  const el = document.createElement('article');
  el.className = 'option';
  el.dataset.key = opt.key;
  el.tabIndex = 0;
  el.setAttribute('role', 'button');
  el.setAttribute('aria-label', `Select option ${opt.key}: ${opt.title}`);

  const diagram = opt.diagram_mermaid
    ? `<div class="mermaid">${html(opt.diagram_mermaid)}</div>`
    : (opt.diagram_svg || '<span class="empty">No diagram</span>');

  el.innerHTML = `
    <div class="option-head">
      <div class="letter">${html(opt.key)}</div>
      <div>
        <h2>${html(opt.title)}</h2>
        <p class="summary">${html(opt.summary)}</p>
      </div>
    </div>
    <div class="diagram">${diagram}</div>
    <dl class="meta">
      <div class="meta-item"><dt>Complexity</dt><dd>${html(opt.complexity)}</dd></div>
      <div class="meta-item"><dt>Fit</dt><dd>${html(opt.fit)}</dd></div>
    </dl>
    <div class="lists">
      <div>
        <p class="list-title">Pros</p>
        <ul class="pros">${opt.pros.map((item) => `<li>${html(item)}</li>`).join('')}</ul>
      </div>
      <div>
        <p class="list-title">Cons</p>
        <ul class="cons">${opt.cons.map((item) => `<li>${html(item)}</li>`).join('')}</ul>
      </div>
    </div>
    <button class="pick-btn" data-pick="${html(opt.key)}" type="button">Choose ${html(opt.key)}</button>
  `;

  return el;
}

function selectOption(choice) {
  document.querySelectorAll('.option').forEach((option) => {
    const selected = option.dataset.key === choice;
    option.classList.toggle('selected', selected);
    option.setAttribute('aria-pressed', selected ? 'true' : 'false');
  });
  status.textContent = `Selected ${choice}.`;
  status.className = 'footer-status';
}

async function submitChoice(choice) {
  selectOption(choice);
  document.querySelectorAll('.pick-btn').forEach((button) => { button.disabled = true; });
  status.textContent = `Submitting ${choice}...`;
  status.className = 'footer-status';

  try {
    if (!window.sp || !window.sp.action) throw new Error('sprint server helper is unavailable');
    await window.sp.action({ slug: SPRINT_SLUG, name: 'design-options', payload: { choice, timestamp: Date.now() } });
    status.textContent = `Choice ${choice} submitted. Return to terminal.`;
    status.className = 'footer-status success';
  } catch (err) {
    status.textContent = 'Submit failed: ' + err.message + '. Type the choice in terminal.';
    status.className = 'footer-status error';
    document.querySelectorAll('.pick-btn').forEach((button) => { button.disabled = false; });
  }
}

function renderError(err) {
  grid.innerHTML = '';
  status.textContent = 'Design options are not ready: ' + err.message;
  status.className = 'footer-status error';
}

function html(value) {
  return String(value == null ? '' : value).replace(/[&<>"']/g, (char) => ({
    '&': '&amp;',
    '<': '&lt;',
    '>': '&gt;',
    '"': '&quot;',
    "'": '&#39;'
  }[char]));
}

let options = [];
try {
  options = readOptions();
  options.forEach((opt) => grid.appendChild(renderOption(opt)));
} catch (err) {
  renderError(err);
}

grid.addEventListener('click', (event) => {
  const card = event.target.closest('.option');
  if (!card) return;
  const choice = card.dataset.key;
  if (event.target.closest('[data-pick]')) {
    submitChoice(choice);
  } else {
    selectOption(choice);
  }
});

grid.addEventListener('keydown', (event) => {
  const card = event.target.closest('.option');
  if (!card) return;
  if (event.key === 'Enter' || event.key === ' ') {
    event.preventDefault();
    selectOption(card.dataset.key);
  }
});

if (window.mermaid && options.length) {
  window.mermaid.initialize({
    startOnLoad: false,
    theme: 'base',
    securityLevel: 'strict',
    themeVariables: {
      background: '#fbfbfd',
      primaryColor: '#ffffff',
      primaryTextColor: '#1d1d1f',
      primaryBorderColor: '#d2d2d7',
      lineColor: '#86868b',
      secondaryColor: '#f5f5f7',
      tertiaryColor: '#e8f2ff',
      fontFamily: '-apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif'
    }
  });
  window.mermaid.run({ querySelector: '.mermaid' }).catch((err) => console.warn('mermaid render error:', err.message));
}
</script>
</body>
</html>
