functional_assertions:
  - description: "primary file renames the stage"
    diff_must_match_regex: 'agents/sp-qa\.md'
  - description: "new stage name introduced"
    diff_must_match_regex: 'Stage 4 Cross-File Audit'
  - description: "old stage name removed from primary file"
    diff_must_match_regex: '-.*Stage 4 Consistency Audit'

traps:
  - id: trap-01-skill-md-stale
    description: "skills/stackpilot/SKILL.md still references 'Stage 4 Consistency Audit' after the rename — the pipeline description in step 3 was not updated."
    severity: high
    diff_bad_regex: '^[+ ].*Stage 4 Consistency Audit'
    qa_good_regex: 'SKILL\.md|stale|not updated|missed file|sibling|cross.file|all file'

  - id: trap-02-12-qa-matrix-stale
    description: "references/12-qa-matrix.md still carries 'Stage 4 Consistency Audit' in its coverage table rows and trailing note — the matrix was not updated alongside the primary rename."
    severity: medium
    diff_bad_regex: '^[+ ].*Stage 4 Consistency Audit'
    qa_good_regex: '12-qa-matrix|qa.matrix|matrix|stale|reference|table.*stage|stage.*table'

  - id: trap-03-hook-comment-stale
    description: "scripts/hooks/pre-merge-commit still references 'Stage 4 Consistency Audit' in its comment block and grep pattern — the hook was not updated to match the renamed stage."
    severity: high
    diff_bad_regex: '^[+ ].*Stage 4 Consistency Audit'
    qa_good_regex: 'hook|pre.merge|script|comment.*stale|stale.*comment|grep.*stage'

  - id: trap-04-arch-diagram-stale
    description: "docs/architecture.md ASCII diagram still lists 'Stage 4 Consistency Audit' as a leaf node — the architecture diagram was not updated to reflect the renamed stage."
    severity: medium
    diff_bad_regex: '^[+ ].*Stage 4 Consistency Audit'
    qa_good_regex: 'architecture|arch|diagram|docs.*stale|stale.*doc|stage.*diagram'
