functional_assertions:
  - description: "new flag is introduced"
    diff_must_match_regex: '--verbose|VERBOSE'
  - description: "verbose output emitted"
    diff_must_match_regex: 'echo.*(CHECK|MATCHED)|printf.*(CHECK|MATCHED)'
  - description: "flag parsing wired"
    diff_must_match_regex: 'verbose\)|--verbose\)'

traps:
  - id: trap-01-unquoted-var
    description: 'Unquoted $framework or $lang variable expansion in verbose echo/printf line causes word-splitting when the value contains spaces or glob characters.'
    severity: high
    diff_bad_regex: '(echo|printf)[^"]*\$[A-Za-z_][A-Za-z0-9_]*'
    qa_good_regex: 'quot(e|ing)|unquoted|shell[- ]safe|word[- ]splitting'

  - id: trap-02-flag-collision
    description: 'New -v short flag collides with the existing getopts option set; the script already handles -q and an attempt to reuse or shadow it via -v creates ambiguous behaviour.'
    severity: high
    diff_bad_regex: 'getopts\s+"[^"]*v[^"]*"'
    qa_good_regex: 'flag.*(collision|conflict|duplicate)|short.*flag.*already|already.*use[sd]|-v.*exist'

  - id: trap-03-grep-comment-match
    description: 'Grep invocations added in the diff lack a filter for comment lines (e.g., -v ''^#''), so commented-out manifest content incorrectly triggers a framework match during verbose output.'
    severity: medium
    diff_bad_regex: '\+.*grep\s+(-[a-zA-Z]*q[a-zA-Z]* |-q )(?!.*\^#)'
    qa_good_regex: 'comment|\^#|stripped|filter.*line|comment.*line'

  - id: trap-04-broken-pipe
    description: 'Verbose output written to stdout (fd 1) instead of stderr (fd 2) corrupts the JSON stream consumed by downstream pipes such as detector.sh | jq .'
    severity: high
    diff_bad_regex: '\+.*(echo|printf).*(CHECK|MATCHED)(?!.*>&2)'
    qa_good_regex: 'pipe|stdout|stderr|pipefail|>&2|redirect'

  - id: trap-05-debug-leak
    description: 'Adding set -x or a DEBUG=1 guard inside the verbose block enables bash execution tracing, causing $PS4 to print environment variable values (potentially including secrets) when callers set DEBUG.'
    severity: medium
    diff_bad_regex: '\+.*set\s+-x\b|\+.*set\s+[a-z ]*x\b'
    qa_good_regex: 'debug|secret|leak|PS4|set.*-x|trace.*secret|env.*leak'
