sprint_id: regional-billing-ledger-cutover
tasks:
  - id: TASK-001
    title: Cut billing writes over to the new regional ledger
    description: |
      Move billing writes to the new regional ledger. Keep existing
      subscription, webhook, refund, invoice export, and reconciliation
      behavior working during the migration. Honor all CLAUDE.md
      non-negotiable rules (dual-write/shadow mode, idempotency,
      cents-as-integers, no PII in payloads, cursor-based backfill,
      no new infra).
    type: refactor
    complexity: standard
    depends_on: []
    relevant_files:
      - src/api/subscription.ts
      - src/api/webhooks/stripe.ts
      - src/api/refunds.ts
      - src/api/invoiceExport.ts
      - src/billing/invoiceService.ts
      - src/billing/refundService.ts
      - src/billing/subscriptionService.ts
      - src/jobs/reconcileStripe.ts
      - src/jobs/backfillLedger.ts
      - src/ledger/currentLedgerView.ts
      - src/lib/idempotency.ts
      - src/lib/region.ts
      - src/lib/featureFlags.ts
