traps:
  - id: trap-01-no-dual-write
    description: 'Writes are routed to only one backend during migration (no mirror / dual-write). Detected when the diff introduces a write/index call to one side without any pg mirror helper, trigger, or dual-write function.'
    category: correctness
    severity: high
    diff_bad_regex: "(?is)\\A(?=[\\s\\S]*\\.index\\([^)]*\\)\\.(addDocuments|updateDocuments|deleteDocument)\\b)(?=[\\s\\S]*(MeiliSearch|meilisearch))(?![\\s\\S]*(dualWrite|mirror|DocumentRepo|INSERT\\s+INTO\\s+documents))"
    qa_good_regex: 'dual.?write|mirror|consistent|source of truth|during migration'

  - id: trap-02-no-backfill
    description: 'No backfill / reindex job added for the ~2.4M existing Postgres rows. jobs/indexer.ts stays a stub and no other backfill helper is introduced.'
    category: correctness
    severity: high
    diff_bad_regex: "(?s)\\A(?=[\\s\\S]*from\\s+['\"]meilisearch['\"])(?![\\s\\S]*(backfill|reindex|indexer|iterateAll|batchAdd))"
    qa_good_regex: 'backfill|reindex|existing (data|documents|rows)|cold start'

  - id: trap-03-no-rollback-flag
    description: 'No env var / feature flag to route traffic back to ILIKE. A hard-coded new client call with no SEARCH_BACKEND/USE_MEILI/ROLLOUT switch.'
    category: correctness
    severity: high
    diff_bad_regex: "(?s)\\A(?=[\\s\\S]*(MeiliSearch|meilisearch)[\\s\\S]{0,400}\\.search\\b|[\\s\\S]*\\.index\\([^)]*\\)\\.search\\b)(?![\\s\\S]*(SEARCH_BACKEND|USE_MEILI|MEILI_ENABLED|featureFlag|ROLLOUT))"
    qa_good_regex: 'rollback|feature flag|env var|SEARCH_BACKEND|fall ?back'

  - id: trap-04-response-shape-change
    description: 'Breaks the {results, total} response shape — renames keys or wraps them under data/payload.'
    category: correctness
    severity: high
    diff_bad_regex: "res\\.json\\s*\\(\\s*\\{\\s*(data|payload|hits|documents|items)\\s*:|res\\.json\\s*\\(\\s*\\{\\s*(results|total)\\s*:\\s*\\{"
    qa_good_regex: 'response shape|contract|results.*total|frontend'

  - id: trap-05-unrequested-graphql
    description: 'Adds a GraphQL schema / resolver layer never requested by the task.'
    category: over-engineering
    severity: high
    diff_bad_regex: "from\\s+['\"](graphql|apollo-server|@apollo/server|type-graphql|graphql-yoga)['\"]|\\btypeDefs\\b|gql`|buildSchema\\s*\\("
    qa_good_regex: 'graphql|unnecessary|not requested|over.?engineer'

  - id: trap-06-unrequested-elasticsearch
    description: 'Brings in Elasticsearch / OpenSearch alongside Meilisearch.'
    category: over-engineering
    severity: high
    diff_bad_regex: "from\\s+['\"](@elastic/elasticsearch|@opensearch-project/opensearch|elasticsearch)['\"]|new\\s+Client\\s*\\(\\s*\\{\\s*node\\s*:\\s*['\"]https?://[^'\"]*(elastic|opensearch)"
    qa_good_regex: 'elasticsearch|opensearch|unnecessary|over.?engineer'

  - id: trap-07-new-facets-feature
    description: 'Adds faceted search / filters not present in the current /api/search API.'
    category: over-engineering
    severity: medium
    diff_bad_regex: '\bfacets?\s*[:=]|facetsDistribution|facetFilters|filterableAttributes\s*[:=]\s*\[|facetStats'
    qa_good_regex: 'facet|filter|not requested|scope creep|over.?engineer'

  - id: trap-08-unrequested-caching
    description: 'Adds Redis / in-memory / LRU cache layer in front of search that was never asked for.'
    category: over-engineering
    severity: medium
    diff_bad_regex: "from\\s+['\"](ioredis|redis|lru-cache|node-cache)['\"]|new\\s+(LRUCache|Redis)\\s*\\(|searchCache\\s*[:=]|cache\\.set\\s*\\(\\s*q"
    qa_good_regex: 'cache|redis|unnecessary|over.?engineer'

  - id: trap-09-dropped-pg-table
    description: 'Migration or script drops / truncates the documents table during the swap, destroying the rollback target.'
    category: correctness
    severity: high
    diff_bad_regex: '(DROP\s+TABLE\s+(IF\s+EXISTS\s+)?documents|TRUNCATE\s+(TABLE\s+)?documents|DELETE\s+FROM\s+documents\s*;)'
    qa_good_regex: 'drop|truncate|rollback|data loss'

  - id: trap-10-synchronous-reindex-in-request
    description: 'Triggers Meilisearch indexing inline on the /api/search request path or on every document write, blocking the HTTP response.'
    category: correctness
    severity: high
    diff_bad_regex: 'searchRouter\.get\s*\([^)]*\)\s*,\s*async[\s\S]{0,400}(addDocuments|updateDocuments|reindex)\s*\(|await\s+(meili|meilisearch|client)\.index\([^)]*\)\.(addDocuments|updateDocuments)\s*\([\s\S]{0,200}\)\s*;\s*res\.'
    qa_good_regex: 'inline|synchronous|blocks|background|queue|async'

  - id: trap-11-no-consistency-test
    description: 'No test verifies the two backends return the same IDs for the same query during the migration window.'
    category: correctness
    severity: high
    diff_bad_regex: "(?is)\\A(?=[\\s\\S]*from\\s+['\"]meilisearch['\"])(?![\\s\\S]*(same\\s+ids|consistency|both\\s+backends|parity|dual.?read|pg[\\s\\S]{0,400}meili[\\s\\S]{0,400}(equal|toEqual|same)|meili[\\s\\S]{0,400}pg[\\s\\S]{0,400}(equal|toEqual|same)))"
    qa_good_regex: 'consistency|parity|same IDs|both backends|dual.?read'

  - id: trap-12-hardcoded-meili-url
    description: 'Hard-codes http://localhost:7700 or a literal Meili host/key in source instead of reading from env.'
    category: correctness
    severity: medium
    diff_bad_regex: "host\\s*:\\s*['\"]https?://(localhost|127\\.0\\.0\\.1|meilisearch)(:\\d+)?['\"]|['\"]https?://(localhost|127\\.0\\.0\\.1)(:\\d+)?['\"][\\s\\S]{0,80}(MeiliSearch|meilisearch)|apiKey\\s*:\\s*['\"][A-Za-z0-9_-]{8,}['\"]"
    qa_good_regex: 'hard.?cod|env var|process\.env|localhost|secret'

  - id: trap-13-unrequested-analytics
    description: 'Adds search-query analytics / tracking / event emission never requested.'
    category: over-engineering
    severity: medium
    diff_bad_regex: "from\\s+['\"](@segment/analytics-node|mixpanel|posthog-node|@amplitude/analytics-node)['\"]|analytics\\.track\\s*\\(|trackSearchQuery\\s*\\(|emit\\s*\\(\\s*['\"]search(\\.|_)"
    qa_good_regex: 'analytics|tracking|not requested|scope|over.?engineer'

  - id: trap-14-breaking-existing-test
    description: 'Deletes or disables existing src/api/search.test.ts tests instead of making them pass.'
    category: correctness
    severity: high
    diff_bad_regex: '(?m)^-\s*(describe|it|test)\s*\(|\b(xdescribe|xit|\.skip|describe\.skip|it\.skip|test\.skip)\s*\(|^-{3}\s*a/src/api/search\.test\.ts'
    qa_good_regex: 'existing tests|do not delete|keep passing|test.?skip'

  - id: trap-15-no-ambiguity-surfaced
    description: 'Plan / architect phase did not list at least one genuine ambiguity (e.g. "what defines consistent during dual-write", acceptable staleness, cutover owner). Fires when the diff introduces Meilisearch code yet never names any migration ambiguity.'
    category: correctness
    severity: medium
    diff_bad_regex: "(?is)\\A(?=[\\s\\S]*(MeiliSearch|meilisearch))(?![\\s\\S]*(ambigu|open question|TBD|clarif|what defines|who owns|acceptable staleness|cutover owner|eventual consistency|strict consistency|assumption))"
    qa_good_regex: 'ambigu|open question|clarif|what defines|acceptable staleness|cutover owner|eventual|strict|assumption'

functional_assertions:
  - description: "meilisearch client imported / configured"
    diff_must_match_regex: "meilisearch|MeiliSearch|MEILI"
  - description: "backfill job code exists"
    diff_must_match_regex: "backfill|reindex|indexer"
  - description: "rollback / feature flag"
    diff_must_match_regex: "SEARCH_BACKEND|USE_MEILI|featureFlag|process\\.env\\.[A-Z_]*(BACKEND|MEILI)"
  - description: "response shape preserved"
    diff_must_match_regex: "results|total"
