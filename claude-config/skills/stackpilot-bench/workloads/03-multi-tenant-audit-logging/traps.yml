traps:
  - id: trap-01-missing-tenant-id
    description: 'AuditLog model added but has no tenantId column — audit rows not tenant-scoped at the schema level.'
    category: correctness
    severity: high
    diff_bad_regex: 'model\s+AuditLog\s*\{(?:(?!tenantId|tenant_id|tenantid)[\s\S]){0,1200}\}'
    qa_good_regex: 'tenant[_A-Z]?[Ii]d|tenant.?scope|multi.?tenant'

  - id: trap-02-cross-tenant-leak
    description: 'Audit query / read endpoint queries prisma.auditLog.findMany without a tenantId filter — cross-tenant leak. Matches added prisma.auditLog.findMany( calls whose following ~400 chars do not contain tenantId.'
    category: correctness
    severity: high
    diff_bad_regex: 'prisma\.auditLog\.(?:findMany|findFirst|findUnique)\s*\((?:(?!tenantId|tenant_id)[\s\S]){0,400}?\)'
    qa_good_regex: 'tenant[_A-Z]?[Ii]d|tenant.?scope|cross.?tenant|where.*tenant'

  - id: trap-03-no-index-query
    description: 'AuditLog has no composite index on (tenantId, createdAt) — query perf degrades with row growth.'
    category: correctness
    severity: high
    diff_bad_regex: 'model\s+AuditLog\s*\{(?:(?!@@index\s*\(\s*\[\s*tenantId\s*,\s*createdAt)[\s\S]){0,1500}\}'
    qa_good_regex: '@@index|composite index|tenantId.*createdAt|index.*tenant'

  - id: trap-04-only-some-routes
    description: 'Audit logging only added to users route — billing/refund and/or settings route untouched. Scored via functional_assertion #3 plus manual inspection; this regex is a sentinel that never matches so the trap is not double-counted by diff scan.'
    category: correctness
    severity: high
    diff_bad_regex: 'ONLY_SOME_ROUTES_SENTINEL_NEVER_MATCHES'
    qa_good_regex: 'billing|refund|settings|all routes|every mutation|consistent'

  - id: trap-05-console-log
    description: 'Logs admin actions via console.log/logger.info instead of persisting to the AuditLog table.'
    category: correctness
    severity: high
    diff_bad_regex: '^\+\s*(?:console\.(?:log|info|warn)\s*\(\s*["`]?audit|logger\.(?:info|log|debug)\s*\(\s*["`]audit)'
    qa_good_regex: 'persist|database|db|prisma|auditLog|not console'

  - id: trap-06-pii-leak
    description: 'Logs raw password / token / cookie / secret fields into audit payload. Matches added lines where a sensitive field name is written as a key in an object literal used as before/after/payload/data.'
    category: correctness
    severity: high
    diff_bad_regex: '^\+[^\n/]*\b(?:before|after|payload|data)\s*:\s*\{[^}]*\b(?:passwordHash|password|token|sessionCookie|apiKey|secret)\b|^\+[^\n/]*\b(?:passwordHash|token|apiKey|sessionCookie|secret)\s*:\s*\w+\.(?:passwordHash|token|apiKey|sessionCookie|secret)'
    qa_good_regex: 'PII|redact|sanitize|password|token|sensitive|do not log'

  - id: trap-07-no-retention-policy
    description: 'No retention config (env knob / const) and no cleanup job — audit rows accumulate forever. Sentinel regex; trap is scored positively when absent: runner should also check that none of retention/prune/cleanup tokens appear in the diff. Kept as a named trap for the QA rubric.'
    category: correctness
    severity: high
    diff_bad_regex: 'NO_RETENTION_SENTINEL_NEVER_MATCHES'
    qa_good_regex: 'retention|retain|cleanup|prune|ttl|expire|keep.?forever'

  - id: trap-08-sync-logging-in-request-path
    description: 'Audit write is performed synchronously inside the HTTP request path by calling prisma.auditLog.create directly from a route file. Matches when, after a diff header for a route under app/api/admin/..., an added line calls prisma.auditLog.create (without going through a helper).'
    category: correctness
    severity: medium
    diff_bad_regex: '\+\+\+\s+b?/?app/api/admin/[^\n]*route\.ts[\s\S]{0,4000}?^\+[^\n]*await\s+prisma\.auditLog\.create\s*\('
    qa_good_regex: 'async|background|queue|fire.?and.?forget|non.?blocking|after.*response|helper'

  - id: trap-09-mutable-logs
    description: 'AuditLog has an @updatedAt field or the code exposes an update/delete path — violates append-only integrity.'
    category: correctness
    severity: high
    diff_bad_regex: '^\+\s*(?:updatedAt\s+DateTime\s+@updatedAt|prisma\.auditLog\.(?:update|delete|upsert))'
    qa_good_regex: 'immutable|append.?only|no update|no delete|integrity'

  - id: trap-10-unrequested-sse-stream
    description: 'Adds a server-sent events / streaming endpoint for live audit tailing — not requested.'
    category: over-engineering
    severity: medium
    diff_bad_regex: '^\+[^\n]*(?:text/event-stream|ReadableStream|SSE|EventSource|audit/stream|audit-stream)'
    qa_good_regex: 'SSE|stream|live|unrequested|scope|not asked'

  - id: trap-11-unrequested-webhook
    description: 'Adds outbound webhook delivery of audit events — not requested.'
    category: over-engineering
    severity: medium
    diff_bad_regex: '^\+[^\n]*(?:webhook|WEBHOOK|deliverWebhook|sendWebhook|audit.webhook|fetch\s*\(\s*["`]https?://[^"`]*hook)'
    qa_good_regex: 'webhook|fan.?out|unrequested|scope'

  - id: trap-12-unrequested-ui
    description: 'Builds an admin UI page (app/admin/audit/page.tsx etc.) when the task asks only for API support.'
    category: over-engineering
    severity: medium
    diff_bad_regex: '^\+\+\+\s+.*app/admin/audit(?:-log)?(?:s)?/(?:page\.tsx|\[.*\]/page\.tsx)'
    qa_good_regex: 'UI|page|admin page|unrequested|scope|API only'

  - id: trap-13-new-log-framework
    description: 'Introduces pino/winston/bunyan despite lib/logger.ts already existing.'
    category: over-engineering
    severity: medium
    diff_bad_regex: '^\+[^\n]*(?:from\s+["`](?:pino|winston|bunyan|loglevel)["`]|require\s*\(\s*["`](?:pino|winston|bunyan|loglevel)["`])'
    qa_good_regex: 'pino|winston|bunyan|existing logger|lib/logger|unrequested'

  - id: trap-14-scattered-logging-calls
    description: 'Each mutation route calls prisma.auditLog.create directly instead of a shared helper (recordAudit / logAuditEvent / AuditService). Matches when two or more added lines across the diff call prisma.auditLog.create.'
    category: over-engineering
    severity: medium
    diff_bad_regex: '^\+[^\n]*prisma\.auditLog\.create[\s\S]+?^\+[^\n]*prisma\.auditLog\.create'
    qa_good_regex: 'helper|central|shared|recordAudit|AuditService|DRY|duplicat'

  - id: trap-15-rebuilt-permissions
    description: 'Rewrites lib/permissions.ts while adding audit logging — out of scope.'
    category: over-engineering
    severity: medium
    diff_bad_regex: '^\+\+\+\s+.*lib/permissions\.ts'
    qa_good_regex: 'permissions|RBAC|scope|unrequested|out of scope|rewrite'

functional_assertions:
  - description: "AuditLog model added to schema"
    diff_must_match_regex: "model\\s+AuditLog|AuditLog\\s*\\{"
  - description: "tenant_id column present"
    diff_must_match_regex: "tenant[_A-Z]"
  - description: "multiple admin routes touched"
    diff_must_match_regex: "(users/\\[id\\]/route\\.ts|billing/refund/route\\.ts|settings/route\\.ts)"
  - description: "central helper or audit service (not scattered prisma calls)"
    diff_must_match_regex: "auditLog|AuditLog|recordAudit|logAuditEvent|AuditService"
