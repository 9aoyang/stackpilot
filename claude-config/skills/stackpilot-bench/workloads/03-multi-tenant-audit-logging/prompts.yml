zero: |
  Add audit logging to the admin panel. Record every admin action so
  support/compliance can query it.

savvy: |
  Add audit logging to the admin panel. Read sandbox/CLAUDE.md first.
  Requirements:
  - Record every admin mutation action with actor, tenant, resource,
    before/after, ip, timestamp
  - Tenant-scoped: queries must never leak across tenants
  - Support a retention policy (config knob, default 365 days)
  - Do NOT log PII (passwords, tokens, raw session cookies)
  Update all existing admin routes (users, billing, settings) consistently.

