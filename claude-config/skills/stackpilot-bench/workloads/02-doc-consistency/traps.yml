# traps.yml — Workload 02: doc-consistency
#
# Four seeded cross-file inconsistency traps.
#
# Schema per trap:
#   id              — unique identifier
#   description     — human-readable summary
#   diff_bad_regex  — regex matched against the FINAL FILE CONTENT (not the diff)
#                     for traps where "unchanged = bad". See note below.
#   qa_good_regex   — regex matched against the sp-qa report text (stackpilot leg
#                     only); a match means sp-qa caught or mentioned this issue.
#   severity        — high | medium | low
#
# NOTE on diff_bad_regex encoding for stale-reference traps:
# ──────────────────────────────────────────────────────────
# Traps 01–03 test whether a file was *not* updated. The cleanest encoding
# is to grep the FINAL file content (not the unified diff) for the old phrase.
# If the old phrase still exists in the final file, the trap was triggered.
# The runner evaluates diff_bad_regex against the FINAL FILE STATE for traps
# where `check_mode: final_file` is set. For traps without this field, the
# runner evaluates against the unified diff output (default behavior).
#
# Trap 04 tests a subtler case (deletion of history) and uses diff encoding.

traps:

  - id: trap-01-readme-stale
    description: >
      README.md still describes "worktree isolation" as the current isolation
      model after the architecture decision changed to "workspace pools".
      The agent failed to update the "Isolation Model" section in README.md.
    # Encoding: final_file — grep README.md for the old phrase.
    # If it still matches, the trap was triggered (README was not updated).
    check_mode: final_file
    check_file: README.md
    diff_bad_regex: 'worktree isolation.*each dev task runs'
    qa_good_regex: 'README|documentation|inconsistent|outdated|stale'
    severity: high

  - id: trap-02-agent-file-contradiction
    description: >
      agents/sp-qa.md inline example in Stage 4 still references "worktree
      isolation" as a live design decision. After the architecture changes to
      "workspace pools", this example directly contradicts the new decision,
      causing readers to distrust the agent documentation.
    # Encoding: final_file — grep agents/sp-qa.md for the old phrase.
    check_mode: final_file
    check_file: agents/sp-qa.md
    diff_bad_regex: 'worktree isolation.*each dev task runs'
    qa_good_regex: 'sp-qa|agent.*doc|example.*contradict|stale.*example|inconsistent'
    severity: high

  - id: trap-03-reference-duplicate
    description: >
      references/12-qa-matrix.md checklist item still reads "does the dev agent
      respect worktree isolation?" after the isolation model changed to workspace
      pools. The checklist now uses superseded terminology.
    # Encoding: final_file — grep references/12-qa-matrix.md for the old phrase.
    check_mode: final_file
    check_file: references/12-qa-matrix.md
    diff_bad_regex: 'worktree isolation'
    qa_good_regex: 'checklist|matrix|reference.*stale|outdated.*checklist|qa.matrix'
    severity: medium

  - id: trap-04-changelog-misleading
    description: >
      The CHANGELOG.md 1.0 entry ("In 1.0 we introduced worktree isolation per
      task") now positions the old decision as the current state with no
      indication it has been superseded. A bad agent either deletes the entry
      (destroying history) or leaves it unchanged with no framing.
      The BAD outcome to detect here is DELETION of the historical entry.
      Leaving the entry with a "superseded" note is acceptable.
      Leaving the entry completely unchanged (no note) is a soft failure but
      not what diff_bad_regex targets — that case is caught by qa_good_regex.
    # Encoding: diff — check the unified diff for deletion of the historical line.
    # If the diff contains a "-" line removing the 1.0 worktree isolation text,
    # the agent deleted history instead of annotating it.
    check_mode: diff
    diff_bad_regex: '^-.*In 1\.0 we introduced worktree isolation per task'
    qa_good_regex: 'changelog|historical|mislead|supersed|prior.*decision|old.*decision'
    severity: medium

# ---------------------------------------------------------------------------
# Functional assertions
# ---------------------------------------------------------------------------
# These patterns must match in the UNIFIED DIFF (git diff output) for
# functional_pass = true. They verify the main file was actually changed.

functional_assertions:
  - description: "docs/architecture.md contains the new workspace pools wording"
    # The diff must add a line with "Workspace pools" (case-insensitive).
    diff_regex: '^\+.*[Ww]orkspace pools'

  - description: "docs/architecture.md removes the old worktree isolation decision line"
    # The diff must contain a deletion of the old decision line.
    diff_regex: '^-.*[Ww]orktree isolation.*each dev task runs'
