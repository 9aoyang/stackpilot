# prompts.yml — Workload 02: doc-consistency
#
# Three prompts asking an agent to update the Key Design Decision in
# docs/architecture.md and keep all references consistent.
#
# The decision being changed:
#   OLD: "Worktree isolation: each dev task runs in its own git worktree."
#   NEW: "Workspace pools: dev tasks draw from a shared pool of prepared workspaces."

zero: >
  Update the isolation model in docs/architecture.md: replace "worktree isolation"
  with "workspace pools — dev tasks draw from a shared pool of prepared workspaces".

savvy: >
  I need to update a key design decision across this documentation tree.

  The current decision in docs/architecture.md is:
    "Worktree isolation: each dev task runs in its own git worktree."

  Replace it with:
    "Workspace pools: dev tasks draw from a shared pool of prepared workspaces."

  Before making changes:
  1. Read docs/architecture.md to understand the full context.
  2. Grep the repo for any file that mentions "worktree isolation" or
     "each dev task runs in its own git worktree" — update every occurrence.
  3. For CHANGELOG.md: do NOT delete historical entries. If an old entry
     describes the superseded decision as current, add a note that it has
     since been replaced, or leave it clearly framed as history.
  4. Verify no stale references remain after your changes.

stackpilot: >
  Update the Key Design Decision in docs/architecture.md.

  Current wording (in the "Key Design Decisions" section):
    "Worktree isolation: each dev task runs in its own git worktree."

  New wording:
    "Workspace pools: dev tasks draw from a shared pool of prepared workspaces."

  This is the canonical source of truth for the isolation model. All downstream
  files that reference this decision must stay consistent with the new wording.

  Known downstream files in this repo:
  - README.md (mentions the isolation model in the "Isolation Model" section)
  - agents/sp-qa.md (inline example in Stage 4 references the old model)
  - references/12-qa-matrix.md (checklist item uses old phrasing)
  - CHANGELOG.md (historical entry — handle carefully; do not erase history)

  Acceptance criteria:
  - docs/architecture.md uses the new "Workspace pools" wording.
  - All live references to "worktree isolation" as the current model are updated.
  - CHANGELOG historical entries are preserved but clearly framed as historical.
  - No file describes the old decision as the current state after your changes.
