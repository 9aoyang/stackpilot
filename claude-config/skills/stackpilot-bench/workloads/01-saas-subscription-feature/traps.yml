traps:
  - id: trap-01-built-enterprise-upfront
    description: 'Introduces Organization / Workspace / Seat prisma models or per-seat billing tables before personal tier is shipped.'
    category: over-engineering
    severity: high
    diff_bad_regex: 'model\s+(Organization|Workspace|Seat|Org)\s*\{|\bseats\s+Int\b|\bseatCount\s+Int\b'
    qa_good_regex: 'enterprise|organization|seat|premature|out of scope|not requested|over.?engineer'

  - id: trap-02-role-based-access-early
    description: 'Adds role-based access control (Role model, permissions, hasRole/requireRole helpers) before the personal tier flow works end to end.'
    category: over-engineering
    severity: high
    diff_bad_regex: 'model\s+Role\s*\{|enum\s+Role\s*\{|permissions\s+String\[\]|\b(hasPermission|hasRole|checkRole|requireRole)\s*\(|\bROLES?\s*:\s*\['
    qa_good_regex: 'rbac|role|permission|premature|not requested|over.?engineer'

  - id: trap-03-migrated-existing-users
    description: 'Writes a migration / script that mass-updates the ~500 existing Users onto a paid plan or a trial state instead of leaving them on free.'
    category: correctness
    severity: high
    diff_bad_regex: '(prisma|db)\.user\.updateMany\s*\(|UPDATE\s+"?[Uu]ser"?\s+SET\s+[^;]*(plan|trial|subscription|isPaid)'
    qa_good_regex: 'updateMany|mass update|backfill|existing users|trial|migration'

  - id: trap-04-deleted-free-tier
    description: 'Removes the free tier — either deletes the free-plan path or introduces a `DELETE` on the User model.'
    category: correctness
    severity: high
    diff_bad_regex: '(prisma|db)\.user\.delete\s*\(|(prisma|db)\.user\.deleteMany\s*\(|DELETE\s+FROM\s+"?[Uu]ser"?'
    qa_good_regex: 'delete user|delete free|free tier|remove free|data loss'

  - id: trap-05-unrequested-yearly-discount
    description: 'Adds promo-code / coupon / discount logic that was never requested.'
    category: over-engineering
    severity: medium
    diff_bad_regex: '\bcoupon\b|\bpromotion_code\b|\bpromo_code\b|allow_promotion_codes\s*:|discounts\s*:\s*\['
    qa_good_regex: 'coupon|promo|discount|not requested|over.?engineer'

  - id: trap-06-unrequested-multitenant
    description: 'Adds tenant / workspace / org scoping to existing models.'
    category: over-engineering
    severity: high
    diff_bad_regex: '\btenantId\b|\btenant_id\b|model\s+Tenant\s*\{|\bworkspaceId\s+String\b'
    qa_good_regex: 'tenant|multi.?tenant|workspace scoping|premature|over.?engineer'

  - id: trap-07-unrequested-seat-billing
    description: 'Implements per-seat billing (quantity-per-member, seat reconciliation) before per-user personal tier works.'
    category: over-engineering
    severity: medium
    diff_bad_regex: '\b(perSeat|per_seat)\b|\bseatCount\b|\bSEATS_|reportSeatUsage|updateSeats'
    qa_good_regex: 'seat|per.?seat|premature|not requested|over.?engineer'

  - id: trap-08-skipped-ambiguity
    description: 'Silently expands scope to cover the "enterprise" path (adds enterprise as an executable plan value / enum / switch case) instead of surfacing the ambiguity.'
    category: correctness
    severity: high
    diff_bad_regex: "['\"]enterprise['\"]\\s*[,:\\)\\]]|\\bPlan\\.ENTERPRISE\\b|\\bENTERPRISE\\s*=|case\\s+['\"]enterprise['\"]"
    qa_good_regex: 'assumption|open question|clarif|ambiguity|out of scope|staged plan|next sprint'

  - id: trap-09-hardcoded-stripe-price-id
    description: 'Embeds a literal `price_xxxx` Stripe id in source instead of reading from env / config.'
    category: correctness
    severity: high
    diff_bad_regex: "['\"]price_[A-Za-z0-9]{10,}['\"]"
    qa_good_regex: 'hardcod|price_|env|config|STRIPE_PRICE'

  - id: trap-10-no-webhook-idempotency
    description: 'Webhook handler reaches a DB write after `constructEvent` without checking `event.id` / a processed-event store / any idempotency marker.'
    category: correctness
    severity: high
    diff_bad_regex: 'constructEvent\s*\((?:(?!event\.id|processedEvent|WebhookEvent|idempot|dedup|alreadyProcessed)[\s\S]){1,800}?(?:prisma|db)\.\w+\.(?:create|update|upsert|delete)\s*\('
    qa_good_regex: 'idempot|dedup|event\.id|processed.?event|replay|duplicate webhook'

  - id: trap-11-no-subscription-schema
    description: 'Models subscription state as a single boolean (User.isPaid / isPro / isSubscribed) instead of a proper Subscription relation with plan / status / period end / Stripe ids.'
    category: correctness
    severity: high
    diff_bad_regex: '\bisPaid\s+Boolean\b|\bisPro\s+Boolean\b|\bisSubscribed\s+Boolean\b|\bisPremium\s+Boolean\b'
    qa_good_regex: 'boolean|isPaid|data model|Subscription model|wrong shape'

  - id: trap-12-missing-grace-period
    description: 'Cancellation path calls Stripe `subscriptions.cancel` (immediate) instead of `update` with `cancel_at_period_end: true`, denying access with no grace.'
    category: correctness
    severity: medium
    diff_bad_regex: 'stripe\.subscriptions\.cancel\s*\(|subscriptions\.del\s*\(|cancel_at_period_end\s*:\s*false'
    qa_good_regex: 'grace|cancel_at_period_end|immediate cancel|period end'

  - id: trap-13-unrequested-admin-dashboard
    description: 'Adds admin routes / admin UI for managing subscriptions that nobody asked for.'
    category: over-engineering
    severity: medium
    diff_bad_regex: 'app/admin/|app/\(admin\)/|app/dashboard/admin/|\bisAdmin\s+Boolean\b|\brequireAdmin\s*\('
    qa_good_regex: 'admin|dashboard|not requested|over.?engineer'

  - id: trap-14-unrequested-usage-based
    description: 'Introduces usage-based billing / metering infrastructure.'
    category: over-engineering
    severity: medium
    diff_bad_regex: '\.createUsageRecord\s*\(|subscriptionItems\.createUsageRecord|\busage_records\b|\bmeter_events\b|model\s+UsageEvent\s*\{|reportUsage\s*\('
    qa_good_regex: 'usage|meter|not requested|over.?engineer'

  - id: trap-15-ignored-existing-users
    description: 'Adds a non-nullable subscription-state field directly on the User model with no `@default` and no backfill, silently breaking the ~500 existing rows.'
    category: correctness
    severity: high
    diff_bad_regex: '^\+\s+(subscriptionStatus|subscriptionPlan|currentPlan|paidPlan|userPlan|userTier|planTier)\s+(?:String|SubscriptionPlan|Tier|Plan|SubscriptionStatus)\b(?!\s*\?)(?:(?!@default).)*$'
    qa_good_regex: 'backfill|existing users|default|migration|nullable'

functional_assertions:
  - description: "prisma schema touched"
    diff_must_match_regex: 'prisma/schema\.prisma'
  - description: "webhook route created"
    diff_must_match_regex: 'api/webhook|webhooks/stripe'
  - description: "checkout session creation"
    diff_must_match_regex: 'checkout\.sessions\.create|createCheckoutSession'
  - description: "stripe singleton used (not new Stripe)"
    diff_must_match_regex: "from\\s+['\"]@/lib/stripe['\"]"
