sprint_id: sprint-parallel-features
tasks:
  - id: TASK-001
    title: Implement pricingQuote endpoint
    description: |
      Replace the 501 stub in src/api/pricingQuote.ts with a real
      implementation that takes {productId, qty} and returns
      {unitPrice, totalCents}. Pure function from a local in-memory
      price map; no external calls.
    type: feature
    complexity: standard
    depends_on: []
    relevant_files:
      - src/api/pricingQuote.ts

  - id: TASK-002
    title: Implement shippingEstimate endpoint
    description: |
      Replace the 501 stub in src/api/shippingEstimate.ts. Takes
      {weightG, regionCode}, returns {cents, etaDays}. Pure function
      from a local table only.
    type: feature
    complexity: standard
    depends_on: []
    relevant_files:
      - src/api/shippingEstimate.ts

  - id: TASK-003
    title: Implement inventoryCheck endpoint
    description: |
      Replace the 501 stub in src/api/inventoryCheck.ts. Takes
      {productId}, returns {available: boolean, qty: number}. Local
      map only.
    type: feature
    complexity: standard
    depends_on: []
    relevant_files:
      - src/api/inventoryCheck.ts

  - id: TASK-004
    title: Enable integration test for checkout flow
    description: |
      Enable test/integration/checkout-flow.test.mjs which calls
      pricingQuote then shippingEstimate then inventoryCheck and
      verifies the aggregate response shape {price, shipping,
      available}.
    type: feature
    complexity: standard
    depends_on: [TASK-001, TASK-002, TASK-003]
    relevant_files:
      - test/integration/checkout-flow.test.mjs
