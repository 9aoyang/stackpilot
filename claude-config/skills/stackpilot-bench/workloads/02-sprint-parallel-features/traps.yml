traps:
  - id: console-log-left-in
    description: console.log debugging left in production endpoint code
    check_mode: diff
    diff_bad_regex: 'console\.log'
    severity: minor
  - id: returns-501-still
    description: stub HTTP 501 response not replaced with real implementation
    check_mode: final_file
    check_file: src/api/pricingQuote.ts
    diff_bad_regex: 'res\.status\(501\)'
    severity: blocking

functional_assertions:
  - id: all-endpoints-respond
    diff_must_match_regex: 'export\s+(async\s+)?function\s+(pricingQuote|shippingEstimate|inventoryCheck)'

verification_commands:
  - cmd: node test/integration/checkout-flow.test.mjs
    exit_code_required: 0

# No gate_traps for workload 02 — this workload measures parallel speedup,
# not lifecycle gates. See workload 03 for gate_traps.
