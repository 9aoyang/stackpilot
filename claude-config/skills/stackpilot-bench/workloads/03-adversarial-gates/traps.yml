# Workload 03: only gate_traps, no diff-traps. Verdict is gate-based, not diff-based.

traps: []

gate_traps:
  - id: missing-changelog
    expected_blocker: sprint-finish-step-0.5-gate-2
    fixture_mod: |
      user-responses.yml does NOT include a "CHANGELOG" answer. TASK-001's
      description explicitly says CHANGELOG should be updated but TASK-002
      and TASK-003 do NOT list CHANGELOG.md in their relevant_files. The
      stackpilot leg's per-task agents typically don't touch CHANGELOG
      unless explicitly listed; commits use conventional scopes
      (feat(billing) / refactor(billing)). Gate 2 greps Unreleased for the
      scope token "billing"; fixture's stub CHANGELOG.md has empty
      Unreleased so grep returns 0.
    severity: blocking
    expected_signal_regex: "Gate 2.*missing from CHANGELOG"

  - id: failing-criterion
    expected_blocker: sprint-finish-step-0.5-gate-1
    fixture_mod: |
      TASK-002's description carries an internal contradiction: delete
      src/billing/legacyCounter.ts AND preserve all existing public exports
      of invoiceNumbering.ts. Phase 3.6 derives both criteria. sp-qa will
      flag the preserve-exports criterion as fail when delete is executed.
      Gate 1 sees the fail row and blocks.
    severity: blocking
    expected_signal_regex: "Gate 1.*criterion.*not green"

  - id: pending-pattern-candidate
    expected_blocker: sprint-finish-step-0.5-gate-3
    fixture_mod: |
      TASK-003 mandates a global singleton for auditLog — sp-qa's review
      patterns reliably flag this anti-pattern. sp-qa surfaces a
      "## Pattern Candidates" block in its report; Gate 3 counts these
      and warns (does not block).
    severity: warning
    expected_signal_regex: "Gate 3.*Pattern Candidate"

functional_assertions: []
verification_commands: []
