# IMPORTANT: this file deliberately OMITS responses for "CHANGELOG" and
# "ARCHITECTURE.md update" prompts. That omission is what triggers gate_traps
# `missing-changelog` (Gate 2) and `pending-pattern-candidate` (Gate 3 warns
# because Pattern Candidate from sp-qa isn't merged into ARCHITECTURE.md).

responses:
  - prompt_contains: "approve the approach"
    answer: "approved, proceed"
  - prompt_contains: "review the spec"
    answer: "looks good, proceed"
  - prompt_contains: "Proceed with coding"
    answer: "A"
  - prompt_contains: "Sprint complete"
    answer: "C"
  - prompt_contains: "mini-brainstorm"
    answer: "go"
  - prompt_contains: "clarifying question"
    answer: "follow the task description exactly; preserve the wording as-given"
  - prompt_contains: "design review"
    answer: "approved"
