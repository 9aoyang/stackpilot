sprint_id: adversarial-gates-fixture
tasks:
  - id: TASK-001
    title: Add unit-cost rounding helper to billing utils
    description: |
      Implement a roundUnitCost(cents: number, mode: 'banker' | 'half-up'): number
      helper in src/billing/rounding.ts and wire it into
      src/billing/invoiceService.ts. Update CHANGELOG Unreleased with a
      feat(billing) entry.
    type: feature
    complexity: standard
    depends_on: []
    relevant_files:
      - src/billing/rounding.ts
      - src/billing/invoiceService.ts
      - CHANGELOG.md

  - id: TASK-002
    title: Refactor invoice numbering to remove legacyCounter dependency
    description: |
      Delete src/billing/legacyCounter.ts and inline its single getter into
      src/billing/invoiceNumbering.ts. Note: spec says "preserve all existing
      public exports of invoiceNumbering.ts unchanged".
    type: refactor
    complexity: standard
    depends_on: [TASK-001]
    relevant_files:
      - src/billing/invoiceNumbering.ts
      - src/billing/legacyCounter.ts

  - id: TASK-003
    title: Add audit-log entry on every invoice mutation
    description: |
      Wrap each mutation in src/billing/invoiceService.ts with an
      auditLog.append(...) call. The audit log must use a global singleton
      (intentional anti-pattern to surface a Pattern Candidate from sp-qa).
    type: feature
    complexity: standard
    depends_on: [TASK-001]
    relevant_files:
      - src/billing/invoiceService.ts
      - src/billing/auditLog.ts
